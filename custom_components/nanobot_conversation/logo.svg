  <line x1="402" y1="258" x2="330" y2="270" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="407" y1="278" x2="332" y2="280" stroke="#c7d2fe" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
